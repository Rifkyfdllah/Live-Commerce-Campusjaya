<!-- register.page.html -->
<ion-content [fullscreen]="true" class="register-content">

  <!-- Background Gradient -->
  <div class="background-overlay"></div>

  <!-- Wrapper -->
  <div class="register-wrapper">

    <!-- Brand / Logo -->
    <div class="brand-section animate-fade-up">

      <!-- Mockup Logo -->
      <div class="logo-container">
        <div class="logo-icon">
          TG
        </div>
        <img
          src="https://i.ibb.co.com/5XYnQj40/Whats-App-Image-2026-05-08-at-20-50-17.jpg"
          alt="TokoGenZ Logo"
          class="logo-image"
        />
      </div>

      <p>
        <b>Already have an account? </b> <a routerLink="/login">Sign in</a>
      </p>

    </div>

    <!-- Register Card -->
    <div class="register-card animate-fade-up">

      <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

        <!-- Nama Toko Field -->
        <div class="floating-input">
          <input
            type="text"
            formControlName="namaToko"
            placeholder=" "
          />
          <label>Shop Name</label>
        </div>

        <!-- Validation Nama Toko -->
        <small
          class="error-text"
          *ngIf="registerForm.get('namaToko')?.touched && registerForm.get('namaToko')?.invalid"
        >
          The shop name must be filled in
        </small>

        <!-- Email Field -->
        <div class="floating-input">
          <input
            type="email"
            formControlName="email"
            placeholder=" "
          />
          <label>Email</label>
        </div>

        <!-- Validation Email -->
        <small
          class="error-text"
          *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
        >
          Emial is invalid
        </small>

        <!-- Password Field -->
        <div class="floating-input password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder=" "
          />
          <label>Password</label>

          <!-- Show Password Button -->
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
          >
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>

        <!-- Validation Password -->
        <small
          class="error-text"
          *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
        >
          Password of at least 6 characters
        </small>

        <!-- Konfirmasi Password Field -->
        <div class="floating-input password-wrapper">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder=" "
          />
          <label>Confirm Password</label>

          <!-- Show Confirm Password Button -->
          <button
            type="button"
            class="toggle-password"
            (click)="toggleConfirmPassword()"
          >
            {{ showConfirmPassword ? 'Hide' : 'Show' }}
          </button>
        </div>

        <!-- Validation Konfirmasi Password -->
        <small
          class="error-text"
          *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')"
        >
          Confirm password does not match
        </small>

        <!-- Register Button -->
        <button
          type="submit"
          class="register-btn"
          [disabled]="registerForm.invalid"
        >
          Register Store
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <span>Or register with</span>
      </div>

      <!-- Google OAuth Button -->
      <button
        class="google-btn"
        (click)="onGoogleRegister()"
      >
        <img
          src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
          alt="Google"
        />
        <span>Google</span>
      </button>

    </div>
  </div>

</ion-content>
