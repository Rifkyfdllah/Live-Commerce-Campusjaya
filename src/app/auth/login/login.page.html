<!-- login.page.html -->
<ion-content [fullscreen]="true" class="login-content">

  <!-- Background Gradient -->
  <div class="background-overlay"></div>

  <!-- Wrapper -->
  <div class="login-wrapper">

    <!-- Brand / Logo -->
    <div class="brand-section animate-fade-up">

    <!-- Mockup Logo -->
    <div class="logo-container">

        <div class="logo-icon">
        TG
        </div>

        <img
        src="https://i.ibb.co.com/5XYnQj40/Whats-App-Image-2026-05-08-at-20-50-17.jpg"
        alt="TokoGenZ Logo"
        class="logo-image"
        />

    </div>

    <p>
        <b>Don't have an account yet? </b> <a routerLink="/register">Register here</a>
    </p>

    </div>
    <!-- Login Card -->
    <div class="login-card animate-fade-up">

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

        <!-- Email Field -->
        <div class="floating-input">
          <input
            type="email"
            formControlName="email"
            placeholder=" "
          />
          <label>Email</label>
        </div>

        <!-- Validation Email -->
        <small
          class="error-text"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        >
          Emal is invalid
        </small>

        <!-- Password Field -->
        <div class="floating-input password-wrapper">

          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder=" "
          />

          <label>Password</label>

          <!-- Show Password Button -->
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
          >
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>

        </div>

        <!-- Validation Password -->
        <small
          class="error-text"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        >
          Password of at least 6 characters
        </small>

        <!-- Login Button -->
        <button
          type="submit"
          class="login-btn"
          [disabled]="loginForm.invalid"
        >
          Login
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <span>Or continue with</span>
      </div>

      <!-- Google OAuth Button -->
      <button
        class="google-btn"
        (click)="onGoogleLogin()"
      >
        <img
          src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
          alt="Google"
        />
        <span>Google</span>
      </button>

    </div>
  </div>

</ion-content>
